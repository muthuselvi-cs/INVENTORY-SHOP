<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 ">
  <h3 class="text-center mb-4 ">🧾 Checkout</h3>

  <div class="row aligin-middle mx-5">

    <!-- LEFT : Address + Payment -->
    <div class="col-md-12">
      <div class="card p-4 mb-3 shadow-sm">
        <h5 class="mb-3 text-center">📍 Delivery Address</h5>

        <form method="POST" action="{{ url_for('place_order') }}">

          <input class="form-control mb-2 text-center" name="name" placeholder="Full Name" required>
          <input class="form-control mb-2 text-center" name="phone" placeholder="Mobile Number" required>
          <textarea class="form-control mb-3 text-center" name="address" placeholder="Address" required></textarea>

          <h5 class="mb-2 text-center">💳 Payment Method</h5>

          <!-- COD -->
          <div class="form-check mb-2 ">
            <input class="form-check-input" type="radio" name="payment" value="COD" checked onclick="showPayment('cod')">
            <label class="form-check-label">Cash on Delivery</label>
          </div>

          <!-- UPI -->
          <div class="form-check mb-2 ">
            <input class="form-check-input" type="radio" name="payment" value="UPI" onclick="showPayment('upi')">
            <label class="form-check-label">UPI (GPay / PhonePe / Paytm)</label>
          </div>

          <div id="upiBox" class="mb-3 d-none">
            <input class="form-control" name="upi_id" placeholder="Enter UPI ID (example@upi)">
          </div>

          <!-- CARD -->
          <div class="form-check mb-2 ">
            <input class="form-check-input" type="radio" name="payment" value="CARD" onclick="showPayment('card')">
            <label class="form-check-label ">Debit / Credit Card</label>
          </div>

          <div id="cardBox" class="mb-3 d-none">
            <input class="form-control mb-2 text-center" placeholder="Card Number">
            <div class="row">
              <div class="col">
                <input class="form-control" placeholder="MM/YY">
              </div>
              <div class="col">
                <input class="form-control text-center" placeholder="CVV">
              </div>
            </div>
          </div>

          <button type="submit" class="btn btn-success w-100 mt-3">Place Order</button>
        </form>
      </div>
    </div>

<div class="row align-items-stretch">

  <!-- RIGHT : Payment Summary -->
  <div class="col-md-12">
    <div class="card p-4 shadow-sm h-100">
      <h5 class="mb-3">💰 Payment Summary</h5>

      <div class="d-flex justify-content-between fs-5">
        <span>Payable Amount</span>
        <strong>₹{{ grand_total }}</strong>
      </div>

      <small class="text-muted">
        (Includes GST & all charges)
      </small>

      <a href="/order_summary" class="mt-3 d-inline-block">
        View order summary
      </a>
    </div>
  </div>

</div>



<!-- JS -->
<script>
function showPayment(type) {
  document.getElementById("upiBox").classList.add("d-none");
  document.getElementById("cardBox").classList.add("d-none");

  if (type === "upi") {
    document.getElementById("upiBox").classList.remove("d-none");
  }
  if (type === "card") {
    document.getElementById("cardBox").classList.remove("d-none");
  }
}
</script>

</body>
</html>
